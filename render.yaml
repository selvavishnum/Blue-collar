services:
  # ── Backend API (Python FastAPI) ─────────────────────────────────────────────
  - type: web
    name: shopguard-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: EZVIZ_APP_KEY
        sync: false
      - key: EZVIZ_APP_SECRET
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: DB_PATH
        value: shopguard.db
      - key: DEMO_MODE
        value: false

  # ── Frontend (React PWA Static Site) ─────────────────────────────────────────
  - type: web
    name: shopguard-ui
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false       # Set to: https://shopguard-api.onrender.com

