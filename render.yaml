services:
  # ── Backend API (Python FastAPI) ─────────────────────────────────────────────
  - type: web
    name: shopguard-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    disk:
      name: shopguard-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: EZVIZ_APP_KEY
        sync: false       # Set in Render Dashboard
      - key: EZVIZ_APP_SECRET
        sync: false       # Set in Render Dashboard
      - key: EMAIL_FROM
        sync: false       # Gmail address for sending alerts
      - key: EMAIL_PASSWORD
        sync: false       # Gmail App Password (not your login password)
      - key: EMAIL_TO
        sync: false       # Email address to receive alerts
      - key: DB_PATH
        value: /var/data/shopguard.db
      - key: DEMO_MODE
        value: false

  # ── Frontend (React PWA Static Site) ─────────────────────────────────────────
  - type: web
    name: shopguard-ui
    env: static
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: client/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false       # Set to: https://shopguard-api.onrender.com
